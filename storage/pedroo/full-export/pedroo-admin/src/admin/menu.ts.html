export async function loadPedrooMenu() {
  const res = await fetch(&quot;/api/pedroo/console/menu&quot;);
  const items = await res.json();

  return items.map(item =&gt; ({
    label: item.pipeline,
    to: `/pipeline/${item.pipeline}`,
    status: item.status
  }));
}
