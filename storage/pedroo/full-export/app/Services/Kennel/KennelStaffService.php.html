use Illuminate\Support\Facades\DB;

class KennelStaffService
{

    {
        return DB::table(&#039;pd_kennel_staff&#039;)
            -&gt;where(&#039;kennel_id&#039;, $kennelId)
            -&gt;orderBy(&#039;name&#039;)
            -&gt;get()
            -&gt;toArray();
    }
}
