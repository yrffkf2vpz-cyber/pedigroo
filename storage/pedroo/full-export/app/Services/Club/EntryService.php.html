namespace App\Services\Club;

use Illuminate\Support\Facades\DB;

class EntryService
{
    public function getForEvent(int $eventId): array
    {
        return DB::table(&#039;pd_event_entries&#039;)
            -&gt;where(&#039;event_id&#039;, $eventId)
            -&gt;orderBy(&#039;dog_name&#039;)
            -&gt;get()
            -&gt;toArray();
    }
}
