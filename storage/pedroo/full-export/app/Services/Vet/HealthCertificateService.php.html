namespace App\Services\Vet;

use Illuminate\Support\Facades\DB;

class HealthCertificateService
{
    public function getForDog(int $dogId): array
    {
        return DB::table(&#039;pd_health_certificates&#039;)
            -&gt;where(&#039;dog_id&#039;, $dogId)
            -&gt;orderBy(&#039;issued_at&#039;, &#039;desc&#039;)
            -&gt;get()
            -&gt;toArray();
    }
}
