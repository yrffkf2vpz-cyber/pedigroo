namespace App\Services\RuleEngine;

class RuleParser
{
    public function parse(array|string $json): array
    {
        if (is_string($json)) {
            $json = json_decode($json, true);
        }

        return [
            &#039;field&#039; =&gt; $json[&#039;field&#039;],
            &#039;operator&#039; =&gt; $json[&#039;operator&#039;],
            &#039;value&#039; =&gt; $json[&#039;value&#039;] ?? null,
        ];
    }
}
