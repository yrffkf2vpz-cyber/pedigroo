namespace App\Http\Middleware;

use Closure;

class EnsureOwnerAccess
{
    public function handle($request, Closure $next)
    {
        $dogId = (int) $request-&gt;route(&#039;dogId&#039;);

        if (!auth()-&gt;user()-&gt;ownsDog($dogId)) {
            abort(403);
        }

        return $next($request);
    }
}
