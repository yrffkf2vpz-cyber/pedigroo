namespace App\Http\Middleware;

use Closure;

class EnsureAdminAccess
{
    public function handle($request, Closure $next)
    {
        if (!auth()-&gt;check() || !auth()-&gt;user()-&gt;can(&#039;admin&#039;)) {
            abort(403);
        }

        return $next($request);
    }
}
