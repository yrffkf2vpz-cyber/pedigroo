const IDENTIFIER_CHECK = /^[$A-Z_][0-9A-Z_$]*$/i;

export function isValidIdentifier(name: string): boolean {
  const char = name[0];
  return (
    (char === &#039;$&#039; ||
      char === &#039;_&#039; ||
      (char &gt;= &#039;A&#039; &amp;&amp; char &lt;= &#039;Z&#039;) ||
      (char &gt;= &#039;a&#039; &amp;&amp; char &lt;= &#039;z&#039;)) &amp;&amp;
    IDENTIFIER_CHECK.test(name)
  );
}
