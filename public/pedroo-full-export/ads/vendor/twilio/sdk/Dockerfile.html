<body>
FROM php:7.4

RUN apt-get update -y &amp;&amp; apt-get install -y zip

RUN mkdir /twilio
WORKDIR /twilio
ENV PATH=&quot;vendor/bin:$PATH&quot;

COPY src src
COPY tests tests
COPY composer* ./

COPY --from=composer:latest /usr/bin/composer /usr/local/bin/composer
RUN composer install --prefer-dist
